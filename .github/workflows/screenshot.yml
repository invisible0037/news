name: Scheduled Screenshots

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  capture-screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libxss1 libxtst6 libgtk-3-0
          npm install puppeteer

      - name: Capture screenshots
        run: node capture.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # اضافه کردن فایل‌های jpg
          git add *.jpg screenshot*.jpg
          git commit -m "Update screenshots $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
